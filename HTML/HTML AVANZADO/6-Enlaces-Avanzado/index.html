<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Select, Option y Datalist</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <form>
        <h2>Formulario de contacto</h2>

        <fieldset>  <!-- SIMPLE INPUTS -->
            <legend> INFORMACION BASICA </legend>
            <div class="form_input">
                <label>Nombre Completo
                    <input name="nombre" placeholder="John Doe">
                </label>
            </div>
            <div class="form_input">
                <label>Email
                    <input name="email" placeholder="ejemplo@gmail.com">
                </label>
            </div>
            <div class="form_input">
                <label>Asunto
                    <input name="text" placeholder="Asunto del mensaje">
                </label>
            </div>
        </fieldset>

        <!-- SELECT Y OPTION -->
        <div class="form_input">
            <label>Tipo de Usuario
                <select name="type-of-user">
                    <option value="user1">Seguidor/a</option>
                    <option value="user2">Empresa</option>
                    <option value="user3">Otros</option>
                </select>
            </label>
        </div>

        <!-- DATALIST Y OPTION  -->
        <div class="form_input">
            <label>Referente
                <input list="referente" name="referente">
                <datalist id="referente" name="type-of-user">
                    <option value="user1">Soy Dalto</option>
                    <option value="user2">Empresa</option>
                    <option value="user3">Un amigo</option>
                </datalist>
            </label>
        </div>
        
        
         <!-- TEXTAREA -->
        <div class="form_input">
            <label>Mensaje
                <textarea rows="6"  placeholder="Deja tu mensaje..."></textarea>
            </label>
        </div>
        <div class="form_input">
            <label>Acepto los <a href="terms.html" target="_blank">terminos y condiciones</a>
                <input type="checkbox" class="checkbox">
            </label>
        </div>
    </form>
</body>
</html>
